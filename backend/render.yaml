services:
  - type: web
    name: aura-jewellery-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      uvicorn app.main:app 
      --host 0.0.0.0 
      --port $PORT 
      --workers 2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
