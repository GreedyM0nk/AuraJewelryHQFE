version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENVIRONMENT=development
      - ALLOWED_ORIGINS=http://localhost:5173
      - API_KEY=${API_KEY:-dev-key}
    volumes:
      - ./backend:/app
    command: >
      uvicorn app.main:app 
      --host 0.0.0.0 
      --port 8000 
      --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend
