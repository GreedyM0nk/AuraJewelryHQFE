<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <!-- Outer decorative ring left -->
  <circle cx="40" cy="40" r="36" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <!-- Inner circle -->
  <circle cx="40" cy="40" r="28" fill="#0A0A0A" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- AJ monogram -->
  <text x="40" y="47" text-anchor="middle" font-family="Cinzel, serif" font-size="18" font-weight="700" fill="#C9A84C" letter-spacing="1">AJ</text>
  <!-- Wordmark -->
  <text x="90" y="35" font-family="Cinzel, serif" font-size="14" font-weight="400" fill="#FAFAFA" letter-spacing="3">AURA</text>
  <!-- Thin gold rule -->
  <line x1="90" y1="42" x2="230" y2="42" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <!-- Subtitle -->
  <text x="90" y="56" font-family="Cinzel, serif" font-size="7.5" font-weight="400" fill="#C9A84C" letter-spacing="4" opacity="0.85">JEWELLERY HQ</text>
</svg>
